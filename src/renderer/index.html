<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src data: about:; script-src 'self'" />
  <title>MSG Viewer</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Barra de herramientas: por encima de la cabecera del mensaje -->
    <nav id="toolbar" class="toolbar" aria-label="Acciones">
      <button id="btn-new" class="btn iconbtn"></button>
      <button id="btn-open" class="btn iconbtn"></button>
      <button id="btn-save-as" class="btn iconbtn" data-needs-doc></button>
      <span class="divider" aria-hidden="true"></span>
      <button id="btn-copy" class="btn iconbtn" data-needs-doc></button>
      <button id="btn-find" class="btn iconbtn" data-needs-doc></button>
      <span class="divider" aria-hidden="true"></span>
      <button id="btn-zoom-in" class="btn iconbtn" data-needs-doc></button>
      <button id="btn-zoom-out" class="btn iconbtn" data-needs-doc></button>
      <button id="btn-dark-body" class="btn iconbtn" data-needs-doc aria-pressed="false"></button>
      <span class="divider" aria-hidden="true"></span>
      <button id="btn-unlink" class="btn iconbtn" data-needs-doc aria-pressed="false"></button>
      <button id="btn-link-warn" class="btn iconbtn" data-needs-doc aria-pressed="false"></button>
      <span class="divider" aria-hidden="true"></span>
      <button id="btn-source" class="btn iconbtn" data-needs-doc></button>
      <span class="spacer" aria-hidden="true"></span>
      <div id="export-wrap" class="export-wrap">
        <button id="btn-export" class="btn exportbtn" data-needs-doc
                aria-haspopup="menu" aria-expanded="false" aria-controls="export-menu"></button>
        <div id="export-menu" class="export-menu" role="menu" hidden></div>
      </div>
      <button id="btn-about" class="btn iconbtn"></button>
    </nav>

    <!-- UI-02: panel de cabecera -->
    <header id="header" hidden>
      <div class="header-top">
        <div class="meta">
          <h1 id="subject"></h1>
          <div id="signature-badge" class="badge" hidden></div>
          <table id="meta-table" aria-label="Metadatos del mensaje"></table>
        </div>
      </div>
      <!-- UI-02: chips de adjuntos -->
      <div id="attachments" class="attachments" hidden>
        <div class="attachment-row" id="attachment-row" role="list"></div>
      </div>
    </header>

    <!-- FR-04: estado vacío con drag & drop -->
    <section id="empty-state" class="empty-state">
      <div class="drop-zone" id="drop-zone">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.2" aria-hidden="true">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <path d="m2 7 10 6L22 7"/>
        </svg>
        <h2 id="welcome-title"></h2>
        <p id="welcome-hint"></p>
        <p id="welcome-or" class="muted"></p>
        <button id="btn-welcome-open" class="btn primary"></button>
      </div>
    </section>

    <!-- FR-05: error descriptivo, la app sigue operativa -->
    <section id="error-state" class="error-state" hidden>
      <div class="error-card" role="alert">
        <h2 id="error-title"></h2>
        <p id="error-message"></p>
        <p id="error-detail" class="muted"></p>
        <button id="btn-error-open" class="btn primary"></button>
      </div>
    </section>

    <!-- UI-03: área de visualización -->
    <main id="viewer" hidden>
      <!-- allow-same-origin SIN allow-scripts: el contenido sigue inerte
           (FR-08: sin scripts, sanitizado, CSP), pero el padre puede adjuntar
           los listeners de drag & drop al documento interno (FR-02b). -->
      <iframe id="body-frame" sandbox="allow-same-origin" title="Cuerpo del mensaje"></iframe>
    </main>

    <!-- Exportar PNG: elegir destino (archivo o portapapeles) -->
    <dialog id="png-target-dialog">
      <h3 id="png-target-title"></h3>
      <p id="png-target-body"></p>
      <div class="dialog-actions">
        <button id="btn-png-target-cancel" class="btn"></button>
        <button id="btn-png-target-clipboard" class="btn"></button>
        <button id="btn-png-target-file" class="btn primary"></button>
      </div>
    </dialog>

    <!-- FR-13: diálogo PNG demasiado alto -->
    <dialog id="png-dialog">
      <h3 id="png-dialog-title"></h3>
      <p id="png-dialog-body"></p>
      <div class="dialog-actions">
        <button id="btn-png-cancel" class="btn"></button>
        <button id="btn-png-truncate" class="btn primary"></button>
      </div>
    </dialog>

    <!-- Búsqueda en el mensaje (Ctrl+F) -->
    <div id="findbar" class="findbar" hidden>
      <input id="find-input" type="text" spellcheck="false" />
      <span id="find-count" class="muted"></span>
      <button id="find-prev" class="findbtn" title="Shift+Enter">‹</button>
      <button id="find-next" class="findbtn" title="Enter">›</button>
      <button id="find-close" class="findbtn" title="Esc">✕</button>
    </div>

    <!-- Barra de estado anti-phishing: URL real del enlace bajo el cursor -->
    <div id="linkbar" class="linkbar" hidden></div>

    <!-- Confirmación al abrir un enlace externo (anti-phishing) -->
    <dialog id="leave-dialog">
      <div class="dialog-icon" id="leave-icon" aria-hidden="true"></div>
      <h3 id="leave-title"></h3>
      <p id="leave-body"></p>
      <textarea id="leave-url" class="url-box" readonly rows="3"></textarea>
      <p id="leave-mismatch" class="leave-mismatch" hidden></p>
      <p id="leave-warn" class="muted"></p>
      <div class="dialog-actions">
        <button id="btn-leave-cancel" class="btn"></button>
        <button id="btn-leave-open" class="btn primary"></button>
      </div>
    </dialog>

    <!-- Aviso de rastreo al cargar una imagen remota bajo demanda -->
    <dialog id="remote-img-dialog">
      <div class="dialog-icon" id="remote-img-icon" aria-hidden="true"></div>
      <h3 id="remote-img-title"></h3>
      <p id="remote-img-body"></p>
      <textarea id="remote-img-url" class="url-box" readonly rows="3"></textarea>
      <p id="remote-img-warn" class="muted"></p>
      <div class="dialog-actions">
        <button id="btn-remote-img-cancel" class="btn"></button>
        <button id="btn-remote-img-load" class="btn primary"></button>
      </div>
    </dialog>

    <!-- Confirmación de Unlink (seguridad) -->
    <dialog id="unlink-dialog">
      <div class="dialog-icon" id="unlink-icon" aria-hidden="true"></div>
      <h3 id="unlink-title"></h3>
      <p id="unlink-body"></p>
      <div class="dialog-actions">
        <button id="btn-unlink-cancel" class="btn"></button>
        <button id="btn-unlink-confirm" class="btn primary"></button>
      </div>
    </dialog>

    <!-- Acerca de (mismo estilo que los demás diálogos) -->
    <dialog id="about-dialog" class="about-dialog">
      <div class="dialog-icon" id="about-icon" role="img"></div>
      <h3 id="about-name">MSG Viewer</h3>
      <div id="about-version" class="muted"></div>
      <p id="about-detail"></p>
      <p><a id="about-repo" href="#"></a></p>
      <div id="about-egg" class="about-egg" hidden></div>
      <div class="dialog-actions">
        <button id="btn-about-close" class="btn primary"></button>
      </div>
    </dialog>

    <!-- Asociar tipos de archivo (FR-01) -->
    <dialog id="associate-dialog">
      <div class="dialog-icon" id="associate-icon" aria-hidden="true"></div>
      <h3 id="associate-title"></h3>
      <p id="associate-intro"></p>
      <div id="associate-types" class="assoc-types">
        <label><input type="checkbox" value="msg" checked /> Outlook (.msg)</label>
        <label><input type="checkbox" value="eml" checked /> Email estándar (.eml)</label>
        <label><input type="checkbox" value="emlx" checked /> Apple Mail (.emlx)</label>
      </div>
      <div class="dialog-actions">
        <button id="btn-associate-cancel" class="btn"></button>
        <button id="btn-associate-confirm" class="btn primary"></button>
      </div>
    </dialog>

    <!-- Ofrecimiento al inicio: asociar los tipos de correo (FR-01) -->
    <dialog id="assoc-offer-dialog">
      <div class="dialog-icon" id="assoc-offer-icon" aria-hidden="true"></div>
      <h3 id="assoc-offer-title"></h3>
      <p id="assoc-offer-body"></p>
      <label class="assoc-offer-skip">
        <input type="checkbox" id="assoc-offer-dontask" />
        <span id="assoc-offer-dontask-label"></span>
      </label>
      <div class="dialog-actions">
        <button id="btn-assoc-offer-no" class="btn"></button>
        <button id="btn-assoc-offer-yes" class="btn primary"></button>
      </div>
    </dialog>

    <!-- Activar/desactivar el aviso de enlaces engañosos -->
    <dialog id="linkwarn-dialog">
      <div class="dialog-icon" id="linkwarn-icon" aria-hidden="true"></div>
      <h3 id="linkwarn-title"></h3>
      <p id="linkwarn-body"></p>
      <div class="dialog-actions">
        <button id="btn-linkwarn-cancel" class="btn"></button>
        <button id="btn-linkwarn-confirm" class="btn primary"></button>
      </div>
    </dialog>

    <!-- UI-06: toasts -->
    <div id="toasts" class="toasts" aria-live="polite"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
